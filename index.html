<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <!-- Native / mobile web app shell (Capacitor + iOS web-app) -->
    <meta name="theme-color" content="#123c2e" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Divini Partners" />
    <meta name="mobile-web-app-capable" content="yes" />
    <!-- Primary meta -->
    <title>Divini Partners - The Premium Event Partnership Marketplace</title>
    <meta name="description" content="Divini Partners is the all-in-one event management marketplace for venues, vendors, planners, and clients. Discover partners, request and compare quotes, book, pay, and run day-of coordination in one elevated workspace." />
    <link rel="canonical" href="https://divinipartners.com/" />
    <meta name="robots" content="index, follow, max-image-preview:large" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Divini Partners" />
    <meta property="og:title" content="Divini Partners - The Premium Event Partnership Marketplace" />
    <meta property="og:description" content="One portal for venues, vendors, planners, and clients to manage every event detail - discovery, quotes, bookings, payments, and day-of coordination." />
    <meta property="og:url" content="https://divinipartners.com/" />
    <meta property="og:image" content="https://divinipartners.com/og-image.png" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Divini Partners - The Premium Event Partnership Marketplace" />
    <meta name="twitter:description" content="One portal for venues, vendors, planners, and clients to manage every event detail - discovery, quotes, bookings, payments, and day-of coordination." />
    <meta name="twitter:image" content="https://divinipartners.com/og-image.png" />

    <!-- JSON-LD: Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Divini Partners",
      "url": "https://divinipartners.com/",
      "logo": "https://divinipartners.com/logo.png",
      "description": "The premium event partnership marketplace connecting venues, vendors, planners, and clients to manage every event end to end.",
      "email": "partners@divinipartners.com"
    }
    </script>

    <!-- JSON-LD: SoftwareApplication -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Divini Partners",
      "applicationCategory": "BusinessApplication",
      "applicationSubCategory": "Event Management & Partnerships",
      "operatingSystem": "Web",
      "url": "https://divinipartners.com/",
      "description": "Venues, vendors, planners, and clients discover each other, request and compare quotes, book, pay, and coordinate event day in one elevated workspace.",
      "featureList": [
        "Venue, vendor, planner, and client profiles and discovery",
        "Event creation and bid requests",
        "Standardized quotes and apples-to-apples comparison",
        "Bookings, contracts, and integrated payments",
        "Vendor and venue credential verification",
        "Messaging threads and day-of coordination"
      ],
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD",
        "description": "Free to browse, create a profile, and post events; partner subscription and premium tiers available."
      }
    }
    </script>

    <!-- JSON-LD: FAQPage (keep in sync with a visible FAQ on the page) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What is Divini Partners?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Divini Partners is the premium event partnership marketplace. Venues, vendors, planners, and clients discover each other, request and compare quotes, book, pay, and coordinate event day in one elevated workspace."
          }
        },
        {
          "@type": "Question",
          "name": "Who is Divini Partners for?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Venues, event vendors and suppliers, event planners, and the clients who hire them to plan and run their events."
          }
        },
        {
          "@type": "Question",
          "name": "How is Divini Partners different from booking by email?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Instead of scattered email threads, clients and planners post an event, partners respond with standardized quotes compared side by side, and bookings, payments, and day-of coordination all live in one place."
          }
        },
        {
          "@type": "Question",
          "name": "Are venues and vendors verified?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. Venues and vendors complete a profile and upload credentials and insurance, which are reviewed by an admin before approval, with document-expiration reminders."
          }
        },
        {
          "@type": "Question",
          "name": "How much does Divini Partners cost?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "It is free to browse, create a profile, and post events. Partners can upgrade to subscription and premium tiers for greater visibility and tools."
          }
        }
      ]
    }
    </script>
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/favicon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
