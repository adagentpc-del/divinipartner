    <script>
      (function () {
        var h = location.hostname;
        if (h.indexOf("www.") === 0) {
          var apex = h.slice(4);
          location.replace(
            location.protocol + "//" + apex + location.pathname + location.search + location.hash
          );
        }
      })();
    </script>
