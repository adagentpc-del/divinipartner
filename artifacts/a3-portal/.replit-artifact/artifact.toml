kind = "web"
previewPath = "/"
title = "A3 Partner Portal"
version = "1.0.0"
id = "artifacts/a3-portal"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25555

[services.development]
run = "pnpm --filter @workspace/a3-portal run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/a3-portal", "run", "build" ]
publicDir = "artifacts/a3-portal/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25555"
BASE_PATH = "/"
