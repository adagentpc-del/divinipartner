components:
  schemas:
    # Permissive passthrough envelopes used by the response-shape-only
    # admin endpoints. They only assert the top-level JSON type
    # (object / array / nullable object) and are NOT meant to lock down
    # field-level shape — the handlers themselves still own that.
    AdminGenericObject:
      type: object
      additionalProperties: true
    AdminGenericObjectOrNull:
      oneOf:
        - { type: object, additionalProperties: true }
        - { type: "null" }
    AdminGenericArray:
      type: array
      items:
        type: object
        additionalProperties: true

    # ----- Task #19: typed admin response shapes -------------------------
    # These schemas type the most stable fields on high-traffic admin
    # endpoints (orders, fulfillment, documents, portal requests, email
    # readiness). Fields not declared still pass through — zod.object
    # strips unknown keys by default and sendValidated emits the original
    # payload — but declared fields are now contract-enforced.

    OrderListItem:
      type: object
      required: [id]
      additionalProperties: true
      properties:
        id: { type: integer }
        orderNumber: { type: ["string", "null"] }
        partnerId: { type: ["integer", "null"] }
        partnerName: { type: ["string", "null"] }
        eventId: { type: ["integer", "null"] }
        eventName: { type: ["string", "null"] }
        packageId: { type: ["integer", "null"] }
        packageName: { type: ["string", "null"] }
