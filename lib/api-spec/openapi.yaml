openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: A3 Partner Portal API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: partners
    description: Partner management
  - name: requests
    description: Request management
  - name: assets
    description: Asset management
  - name: pricing
    description: Pricing rules
  - name: public
    description: Public partner portal
  - name: dashboard
    description: Admin dashboard
  - name: Storage
    description: Object storage upload and serving endpoints.
  - name: production
    description: Production handoff and supplier packets.

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /partners:
    get:
      operationId: listPartners
      tags: [partners]
      summary: List all partners
      parameters:
        - name: active
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: List of partners
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Partner"
    post:
      operationId: createPartner
      tags: [partners]
      summary: Create a new partner
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePartnerBody"
      responses:
        "201":
          description: Created partner
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Partner"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /partners/{id}:
    get:
      operationId: getPartner
      tags: [partners]
      summary: Get partner by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Partner details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Partner"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
    patch:
      operationId: updatePartner
      tags: [partners]
      summary: Update a partner
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePartnerBody"
      responses:
        "200":
          description: Updated partner
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Partner"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
    delete:
      operationId: deletePartner
      tags: [partners]
      summary: Delete a partner
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /partners/{id}/assets:
    get:
      operationId: listPartnerAssets
      tags: [assets]
      summary: List assets for a partner
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of partner assets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PartnerAsset"
    post:
      operationId: createPartnerAsset
      tags: [assets]
      summary: Add asset to partner
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePartnerAssetBody"
      responses:
        "201":
          description: Created asset
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PartnerAsset"

  /partners/{id}/assets/{assetId}:
    delete:
      operationId: deletePartnerAsset
      tags: [assets]
      summary: Delete a partner asset
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: assetId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /public/partners/{slug}:
    get:
      operationId: getPublicPartner
      tags: [public]
      summary: Get public partner page data
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Public partner data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicPartner"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /public/partners/{slug}/requests:
    post:
      operationId: submitPublicRequest
      tags: [public]
      summary: Submit a public request through partner portal
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitRequestBody"
      responses:
        "201":
          description: Request submitted successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubmitRequestResponse"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Partner not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /public/pricing:
    get:
      operationId: getPublicPricing
      tags: [public]
      summary: Get public starting-at pricing
      responses:
        "200":
          description: Public pricing data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PublicPricingItem"

  /requests:
    get:
      operationId: listRequests
      tags: [requests]
      summary: List all requests with filters
      parameters:
        - name: partnerId
          in: query
          schema:
            type: integer
        - name: status
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: List of requests
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RequestListResponse"

  /requests/{id}:
    get:
      operationId: getRequest
      tags: [requests]
      summary: Get request detail
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Full request detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RequestDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
    patch:
      operationId: updateRequest
      tags: [requests]
      summary: Update request status or fields
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateRequestBody"
      responses:
        "200":
          description: Updated request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RequestDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /requests/{id}/notes:
    get:
      operationId: listRequestNotes
      tags: [requests]
      summary: List notes for a request
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of notes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminNote"
    post:
      operationId: createRequestNote
      tags: [requests]
      summary: Add a note to a request
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateNoteBody"
      responses:
        "201":
          description: Created note
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminNote"

  /requests/{id}/regenerate-ai:
    post:
      operationId: regenerateAiSummary
      tags: [requests]
      summary: Regenerate AI summary for a request
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Regenerated summaries
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RequestDetail"

  /requests/{id}/regenerate-pdf:
    post:
      operationId: regeneratePdf
      tags: [requests]
      summary: Regenerate PDF summary for a request
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: PDF URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PdfResponse"

  /pricing-rules:
    get:
      operationId: listPricingRules
      tags: [pricing]
      summary: List all pricing rules
      parameters:
        - name: category
          in: query
          schema:
            type: string
        - name: active
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: List of pricing rules
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PricingRule"
    post:
      operationId: createPricingRule
      tags: [pricing]
      summary: Create a pricing rule
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePricingRuleBody"
      responses:
        "201":
          description: Created pricing rule
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PricingRule"

  /pricing-rules/{id}:
    patch:
      operationId: updatePricingRule
      tags: [pricing]
      summary: Update a pricing rule
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePricingRuleBody"
      responses:
        "200":
          description: Updated pricing rule
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PricingRule"
    delete:
      operationId: deletePricingRule
      tags: [pricing]
      summary: Delete a pricing rule
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get admin dashboard summary
      responses:
        "200":
          description: Dashboard summary data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /dashboard/recent-requests:
    get:
      operationId: getRecentRequests
      tags: [dashboard]
      summary: Get recent requests for dashboard
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
      responses:
        "200":
          description: Recent requests
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RequestSummary"

  /dashboard/requests-by-status:
    get:
      operationId: getRequestsByStatus
      tags: [dashboard]
      summary: Get request counts grouped by status
      responses:
        "200":
          description: Status breakdown
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StatusCount"

  /assets/library:
    get:
      operationId: getAssetsLibrary
      tags: [assets]
      summary: Get all assets grouped by partner and request
      responses:
        "200":
          description: Assets library
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssetsLibrary"

  /orders/{orderId}/supplier-packet/{supplierId}:
    get:
      operationId: getSupplierPacket
      tags: [production]
      summary: Get the production packet for a supplier on an order
      description: |
        Returns the supplier-facing production packet for a single order/supplier
        pair: order header + logistics, partner/event/supplier identity, and the
        line items assigned to this supplier with their resolved specs, pricing
        basis, asset links (current + approved + vendor-visible only), and
        readiness flags.
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: integer
        - name: supplierId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Supplier production packet
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SupplierPacketResponse"
        "404":
          description: Order or supplier not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /orders/{id}/readiness:
    get:
      operationId: getOrderReadiness
      tags: [production]
      summary: Get production readiness for an order
      description: |
        Returns per-line-item production readiness info (expectations, asset
        links, blocked reasons, flags) plus a roll-up summary for the order.
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Order readiness
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderReadinessResponse"
        "400":
          description: Invalid id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /order-items/{id}/production-block:
    patch:
      operationId: setOrderItemProductionBlock
      tags: [production]
      summary: Set or clear the production-blocked reason on a line item
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
              properties:
                reason: { type: ["string", "null"] }
                overrideNote: { type: ["string", "null"] }
      responses:
        "200":
          description: Updated order item row
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderItemProductionBlockResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /production/dashboard:
    get:
      operationId: getProductionDashboard
      tags: [production]
      summary: Production review dashboard counters and recent activity
      responses:
        "200":
          description: Production dashboard payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductionDashboardResponse"

  /storage/uploads/request-url:
    post:
      tags: [Storage]
      operationId: requestUploadUrl
      summary: Request a presigned URL for file upload
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UploadUrlRequest'
      responses:
        '200':
          description: Presigned upload URL generated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadUrlResponse'
        '400':
          description: Missing or invalid required fields.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Failed to generate upload URL.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /storage/public-objects/{filePath}:
    get:
      tags: [Storage]
      operationId: getPublicObject
      summary: Serve a public asset
      parameters:
        - name: filePath
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Object content streamed.
          content:
            '*/*':
              schema:
                type: string
                format: binary
        '404':
          description: File not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /storage/objects/{objectPath}:
    get:
      tags: [Storage]
      operationId: getStorageObject
      summary: Serve an object entity
      parameters:
        - name: objectPath
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Object content streamed.
          content:
            '*/*':
              schema:
                type: string
                format: binary
        '404':
          description: Object not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /public/integrations/asset-survey/{partnerSlug}:
    post:
      operationId: surveyWebhook
      tags: [public]
      summary: Inbound webhook from the Venue Asset Survey app
      description: HMAC-SHA256 signed (header `X-Survey-Signature`) ingest of one or more SurveyAsset payloads. Per-partner secret.
      parameters:
        - name: partnerSlug
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                assets:
                  type: array
                  items: { $ref: "#/components/schemas/SurveyAssetIngest" }
              required: [assets]
      responses:
        "200":
          description: Ingest result
          content:
            application/json:
              schema:
                type: object
                required: [created, updated]
                properties:
                  created: { type: integer }
                  updated: { type: integer }
        "401": { description: Invalid signature, content: { application/json: { schema: { $ref: "#/components/schemas/ErrorEnvelope" } } } }
        "404": { description: Unknown partner slug, content: { application/json: { schema: { $ref: "#/components/schemas/ErrorEnvelope" } } } }

  /admin/integrations/asset-survey/pull/{partnerId}:
    post:
      operationId: surveyAdminPull
      tags: [public]
      summary: Admin-triggered pull from the survey app for a partner
      parameters:
        - name: partnerId
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Pull result
          content:
            application/json:
              schema:
                type: object
                required: [created, updated]
                properties:
                  created: { type: integer }
                  updated: { type: integer }

  /admin/integrations/asset-survey/test/{partnerId}:
    post:
      operationId: surveyTestConnection
      tags: [public]
      summary: Probe the configured survey app to confirm it is reachable
      parameters:
        - name: partnerId
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Probe result (`ok=false` is still 200 for diagnostics)
          content:
            application/json:
              schema:
                type: object
                required: [ok]
                properties:
                  ok: { type: boolean }
                  status: { type: integer }
                  probedUrl: { type: string }
                  apiKeyPresent: { type: boolean }
                  message: { type: string }
                  error: { type: string }

  /admin/survey-assets:
    get:
      operationId: surveyAssetsList
      tags: [public]
      summary: List all survey assets (filterable by status / partner)
      parameters:
        - name: status
          in: query
          schema: { type: string, enum: [pending, approved, rejected, all] }
        - name: partnerId
          in: query
          schema: { type: integer }
      responses:
        "200":
          description: Asset list
          content:
            application/json:
              schema:
                type: object
                required: [assets]
                properties:
                  assets:
                    type: array
                    items: { $ref: "#/components/schemas/SurveyAsset" }

  /admin/survey-assets/{id}:
    patch:
      operationId: surveyAssetPatch
      tags: [public]
      summary: Approve, reject, or edit a survey asset
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SurveyAssetPatch" }
      responses:
        "200":
          description: Updated asset
          content:
            application/json:
              schema:
                type: object
                required: [asset]
                properties:
                  asset: { $ref: "#/components/schemas/SurveyAsset" }
    delete:
      operationId: surveyAssetDelete
      tags: [public]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200": { description: Deleted, content: { application/json: { schema: { type: object, required: [ok], properties: { ok: { type: boolean } } } } } }

  /public/partners/{slug}/survey-assets:
    get:
      operationId: surveyPublicList
      tags: [public]
      summary: Public approved survey assets for the partner portal "Brand our space" tile gallery
      parameters:
        - name: slug
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Public-projected assets only (no measurements, no internal fields)
          content:
            application/json:
              schema:
                type: object
                required: [assets]
                properties:
                  assets:
                    type: array
                    items: { $ref: "#/components/schemas/PublicSurveyAsset" }

components:
  schemas:
    SurveyAssetPhoto:
      type: object
      required: [url]
      properties:
        url: { type: string }
        caption: { type: string }

    SurveyAssetMeasurements:
      type: object
      description: Physical measurements. A3-internal — never exposed on /public/* projections.
      additionalProperties: false
      properties:
        widthIn: { type: ["number", "null"] }
        heightIn: { type: ["number", "null"] }
        depthIn: { type: ["number", "null"] }
        diameterIn: { type: ["number", "null"] }
        areaSqft: { type: ["number", "null"] }
        shape: { type: ["string", "null"] }
        measurementUnit:
          type: ["string", "null"]
          enum: [in, cm, ft, null]
          description: Unit the survey app captured. Intake email/UI render measurements in this unit.
        orientation:
          type: ["string", "null"]
          description: landscape | portrait | square | free

    SurveyAssetSurface:
      type: object
      additionalProperties: false
      properties:
        surfaceMaterial: { type: ["string", "null"], description: Physical mounting surface (drywall, glass, fabric, brick…) }
        environment: { type: ["string", "null"], description: indoor | outdoor | covered_outdoor }
        zoneName: { type: ["string", "null"], description: Venue zone (Lobby, Concourse, Suite Level…) }

    SurveyAssetApplications:
      type: object
      additionalProperties: false
      properties:
        primary:
          type: ["array", "null"]
          items: { type: string }
        recommended:
          type: ["array", "null"]
          items: { type: string }
        alternate:
          type: ["array", "null"]
          items: { type: string }
        publicUseCase: { type: ["string", "null"] }

    SurveyAssetVisibility:
      type: object
      additionalProperties: false
      properties:
        visibilityTier:
          type: ["string", "null"]
          description: hero | featured | standard | hidden
        publicStatus:
          type: ["string", "null"]
          description: live | draft | retired
        publicDeckInclude: { type: ["boolean", "null"] }
        portalVisible: { type: ["boolean", "null"] }
        netsuiteInclude: { type: ["boolean", "null"] }
        designNeeded: { type: ["boolean", "null"] }
        commissionEligible: { type: ["boolean", "null"] }
        opsOwner: { type: ["string", "null"] }

    SurveyAssetInternal:
      type: object
      description: Internal-only fields the survey app attaches. Stored server-side, never echoed on /public/* projections.
      additionalProperties: false
      properties:
        notes: { type: ["string", "null"] }
        installNotes: { type: ["string", "null"] }
        productionNotes: { type: ["string", "null"] }
        pricingNotes: { type: ["string", "null"] }
        photos:
          type: ["array", "null"]
          items: { $ref: "#/components/schemas/SurveyAssetPhoto" }
        netsuiteAssetNumber: { type: ["string", "null"] }
