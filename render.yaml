# Render Blueprint for Divini Partners (divinipartners.com).
# One Node web service builds the Vite SPA + the Express backend (server/) and
# serves BOTH from a single process. Database = Render managed Postgres via
# DATABASE_URL. Auth = native email/password (SESSION_SECRET). Uploaded files =
# persistent disk at FILE_STORAGE_DIR (encrypted at rest via STORAGE_ENCRYPTION_KEY).
#
# BUILD: use npm (flat node_modules), mirroring the droplet's deploy.sh, which
# builds cleanly. pnpm's isolated node_modules breaks tsc's automatic @types/node
# discovery, so the server build failed with "Cannot find name 'process'/'console'".
# Frontend is built with `npx vite build` directly (NOT `npm run build`, which runs
# `tsc && vite build` and trips on a pre-existing type error in the dead Shell.tsx).
# The server build runs its own tsc (`npm --prefix server run build`) and is clean.
#
# NODE_ENV is set only at runtime (startCommand), so the build still installs
# devDependencies (vite, typescript, @types/*).
services:
  - type: web
    name: divinipartner
    runtime: node
    # plan: free for now (build-fix validation, no new spend). BEFORE PRODUCTION
    # CUTOVER change to `starter` (~$7/mo) so it never cold-starts AND so the disk
    # block at the bottom can attach (a persistent disk requires a paid plan).
    plan: free
    region: oregon
    branch: main
    autoDeploy: true
    buildCommand: |
      set -e
      npm install --no-audit --no-fund
      BASE_PATH=/ npx vite build
      npm --prefix server install --no-audit --no-fund
      npm --prefix server run build
      rm -rf server/dist/public
      cp -r dist server/dist/public
    startCommand: NODE_ENV=production node --enable-source-maps server/dist/index.js
    healthCheckPath: /api/healthz
    envVars:
      # ---- safe to keep in git (non-secret config) ----
      - key: NODE_VERSION
        value: "22.22.0"
      - key: PRICING_V2
        value: "true"
      - key: VENUE_SHARE_OF_FEE_V2
        value: "0.05"
      - key: FOUNDING_VENUE_CAP
        value: "100"
      - key: STORAGE_PROVIDER
        value: "local"
      - key: FILE_STORAGE_DIR
        value: /data/divini-files
      # ---- set these in the Render dashboard (sync:false = never in git) ----
      # Copy each value verbatim from the droplet's server .env.local.
      - key: DATABASE_URL              # -> Render managed Postgres INTERNAL url
        sync: false
      - key: SESSION_SECRET            # reuse the droplet's value so users stay logged in
        sync: false
      - key: DOWNLOAD_URL_SECRET       # reuse verbatim so signed download URLs keep working
        sync: false
      - key: STORAGE_ENCRYPTION_KEY    # CRITICAL: copy verbatim or existing files cannot be decrypted
        sync: false
      - key: PAYOUT_ENC_KEY            # CRITICAL: copy verbatim or stored payout data cannot be decrypted
        sync: false
      - key: PUBLIC_APP_URL            # https://divinipartners.com
        sync: false
      - key: EMAIL_PROVIDER            # resend
        sync: false
      - key: EMAIL_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: COMPANY_POSTAL_ADDRESS    # CAN-SPAM footer (email only)
        sync: false
      - key: COMPANY_LEGAL_NAME        # Divini Group LLC
        sync: false
      - key: ADMIN_ALLOWED_EMAILS
        sync: false
      # ---- leave UNSET until go-live (no money moves yet) ----
      # STRIPE_SECRET_KEY, STRIPE_PUBLISHABLE_KEY, STRIPE_WEBHOOK_SECRET,
      # PAYPAL_CLIENT_ID, PAYPAL_CLIENT_SECRET, PAYPAL_WEBHOOK_ID, PAYPAL_ENV
      # ---- optional (only if these features are in use) ----
      # LLM_PROVIDER / LLM_API_KEY / LLM_BASE_URL / LLM_MODEL (AI features)
      # SEARCH_PROVIDER / SEARCH_API_KEY (marketplace search)
    # BEFORE CUTOVER: switch plan to `starter` above and UNCOMMENT this disk so
    # uploaded files survive deploys (a persistent disk requires a paid plan).
    # Until then STORAGE_PROVIDER=local writes to ephemeral disk (fine for build
    # validation; not for real uploads). Alternative: set STORAGE_PROVIDER=s3.
    # disk:
    #   name: divini-files
    #   mountPath: /data/divini-files
    #   sizeGB: 5
